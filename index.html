<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AZYL.ai — Safe harbor for AI risk.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #040D1C;
    --mid:     #0A1830;
    --blue:    #3A7BD5;
    --silver:  #B8CCE4;
    --ghost:   #E8EFF8;
    --rule:    #12253D;
    --dim:     #2A4468;
    --muted:   #3A5878;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ghost);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    height: 100vh;
    display: grid;
    grid-template-rows: 64px 1fr 52px;
    padding: 0 52px;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--rule);
  }
  .nav-domain {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .nav-cta {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--muted);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.3s;
    padding-bottom: 1px;
    border-bottom: 1px solid transparent;
  }
  .nav-cta:hover {
    color: var(--silver);
    border-bottom-color: var(--dim);
  }

  /* ── HERO ── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    gap: 0;
  }

  /* Deep radial glow — slightly more present than before */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(58,123,213,0.09) 0%, transparent 68%);
    pointer-events: none;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    position: relative;
    z-index: 1;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 1.1s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Arc draws in cleanly */
  .arc-path {
    stroke-dasharray: 220;
    stroke-dashoffset: 220;
    animation: drawArc 1.4s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
  }
  @keyframes drawArc {
    to { stroke-dashoffset: 0; }
  }
  .arc-dot {
    opacity: 0;
    transform-origin: center;
    transform: scale(0);
    animation: dotPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.9s forwards;
  }
  @keyframes dotPop {
    to { opacity: 1; transform: scale(1); }
  }

  /* ── WORDMARK ── */
  .wordmark-row {
    display: flex;
    align-items: baseline;
  }
  .wordmark-azyl {
    font-size: 58px;
    font-weight: 100;
    letter-spacing: 16px;
    color: var(--ghost);
    line-height: 1;
    font-family: 'Inter', sans-serif;
  }
  .wordmark-ai {
    font-size: 26px;
    font-weight: 200;
    color: var(--blue);
    letter-spacing: 0;
    margin-left: 2px;
  }

  /* ── TAGLINE ── */
  .tagline-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 1.6s forwards;
  }
  .tagline-text {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--silver);
    letter-spacing: 0.3px;
    opacity: 0.75;
  }

  /* ── FOOTER — ghost email only ── */
  footer {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .footer-email {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 2.5px;
    color: var(--rule);
    text-transform: uppercase;
    text-decoration: none;
    transition: color 0.4s;
  }
  .footer-email:hover {
    color: var(--dim);
  }

  @media (max-width: 600px) {
    .page { padding: 0 28px; }
    .wordmark-azyl { font-size: 40px; letter-spacing: 10px; }
    .wordmark-ai { font-size: 20px; }
    .tagline-text { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="page">

  <nav>
    <span class="nav-domain">azyl.ai</span>
    <a href="mailto:INFO@AZYL.AI" class="nav-cta">Get in touch</a>
  </nav>

  <main class="hero">
    <div class="glow"></div>

    <div class="logo-wrap">

      <!-- Harbor Arc — arc draws in, dot pops -->
      <svg viewBox="0 0 120 74" width="120" height="74" aria-label="Azyl harbor arc">
        <path class="arc-path"
          d="M10,70 A56,56 0 0,1 110,70"
          fill="none"
          stroke="#B8CCE4"
          stroke-width="2.5"
          stroke-linecap="round"/>
        <circle class="arc-dot" cx="60" cy="70" r="5.5" fill="#3A7BD5"/>
      </svg>

      <div class="wordmark-row">
        <span class="wordmark-azyl">AZYL</span><span class="wordmark-ai">.ai</span>
      </div>

      <div class="tagline-wrap">
        <span class="tagline-text">Safe harbor for AI risk.</span>
      </div>

    </div>
  </main>

  <footer>
    <a href="mailto:INFO@AZYL.AI" class="footer-email">INFO@AZYL.AI</a>
  </footer>

</div>
</body>
</html>
